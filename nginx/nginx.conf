events {
    worker_connections 1024;
}

http {
    upstream backend {
        server app1:3001;
        server app2:3002;
    }

    server {
        listen 80;
        location / {
            proxy_pass http://backend;
            proxy_read_timeout 35s;   # just above the 30s enforced limit
            proxy_connect_timeout 5s;
        }
    }
}
