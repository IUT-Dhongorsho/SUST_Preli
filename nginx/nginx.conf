events {
    worker_connections 1024;
}

http {
    # ----- Upstream definition with health checks -----
    upstream backend {
        # Load balancing algorithm: least connections (more efficient than round-robin)
        least_conn;

        # Backend servers (adjust ports/hosts as needed)
        server app1:3001 max_fails=3 fail_timeout=30s;
        server app2:3002 max_fails=3 fail_timeout=30s;

        # Optional: keepalive connections for performance
        keepalive 32;
    }

    # ----- Rate limiting (prevent abuse) -----
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_status 429;

    server {
        listen 80;
        server_name _;   # Replace with your domain if known

        # ----- Gzip compression -----
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
        gzip_min_length 1000;

        # ----- Rate limiting applied to all requests -----
        limit_req zone=api_limit burst=20 nodelay;

        # ----- Logging format (structured) -----
        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for" '
                        'rt=$request_time uct="$upstream_connect_time" '
                        'uht="$upstream_header_time" urt="$upstream_response_time"';
        access_log /var/log/nginx/access.log main;
        error_log /var/log/nginx/error.log warn;

        # ----- Main location block -----
        location / {
            proxy_pass http://backend;

            # Timeouts – slightly above the 30s enforced limit
            proxy_connect_timeout 5s;
            proxy_send_timeout 35s;
            proxy_read_timeout 35s;

            # Buffer settings for large responses
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 8 8k;

            # Headers to forward client details
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disable caching for dynamic responses
            proxy_cache_bypass $http_cache_control;
            add_header Cache-Control "no-cache, no-store, must-revalidate";

            # Health check detection – if backend returns 5xx, nginx tries next
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 30s;

            # Keepalive support
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ----- Health check endpoint for nginx itself (optional) -----
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ----- Error pages (customise as needed) -----
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}